<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SectionSorter — Sonoran Schools 2025-26</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#2563EB;--blue-light:#EFF6FF;--blue-mid:#BFDBFE;
    --amber:#D97706;--amber-light:#FFFBEB;--amber-mid:#FDE68A;
    --green:#16A34A;--green-light:#F0FDF4;
    --red:#DC2626;--red-light:#FEF2F2;
    --gray:#6B7280;--gray-light:#F9FAFB;--gray-border:#E5E7EB;
    --text:#111827;--text-muted:#6B7280;
    --radius:10px;--radius-sm:6px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
    --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.05);
  }
  body{font-family:'DM Sans',sans-serif;background:#F3F4F6;min-height:100vh;color:var(--text)}
  .app-shell{display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid var(--gray-border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .brand{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.3px}
  .brand em{color:var(--blue);font-style:normal}
  .brand small{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px}
  .view-tabs{display:flex;gap:4px}
  .vtab{padding:6px 16px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s}
  .vtab.active{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
  .vtab:hover:not(.active){background:var(--gray-light)}
  .main{flex:1;padding:1.25rem 1.5rem;max-width:980px;margin:0 auto;width:100%}
  .grade-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
  .gpill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--gray-border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s}
  .gpill:hover{border-color:#9CA3AF}
  .gpill.active{color:#fff;border-color:transparent;box-shadow:var(--shadow)}
  .card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-border);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
  .card-title{font-size:16px;font-weight:600}
  .card-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
  .stats-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .spill{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .sp-total{background:var(--gray-light);color:var(--gray)}
  .sp-a{background:var(--blue-light);color:var(--blue)}
  .sp-b{background:var(--amber-light);color:var(--amber)}
  .sp-unset{background:var(--red-light);color:var(--red)}
  .sp-done{background:var(--green-light);color:var(--green)}
  .prog-wrap{height:5px;background:#E5E7EB;border-radius:3px;overflow:hidden;display:flex;margin-bottom:1rem}
  .prog-a{background:var(--blue);transition:width .4s ease}
  .prog-b{background:var(--amber);transition:width .4s ease}
  .toolbar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
  .toolbar input{flex:1;min-width:150px;padding:7px 11px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;outline:none}
  .toolbar input:focus{border-color:var(--blue)}
  .fbtn{padding:6px 11px;border-radius:var(--radius-sm);border:1px solid var(--gray-border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .12s}
  .fbtn.active{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
  .fbtn:hover:not(.active){background:var(--gray-light)}
  .auto-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid #BBF7D0;background:#F0FDF4;color:#15803D;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif}
  .auto-btn:hover{background:#DCFCE7}
  .reset-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid #FECACA;background:#FEF2F2;color:#B91C1C;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif}
  .reset-btn:hover{background:#FEE2E2}
  .print-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif}
  .print-btn:hover{background:var(--gray-light)}
  /* student rows */
  .stu-list{display:flex;flex-direction:column;gap:4px}
  .stu-row{border:1px solid var(--gray-border);border-radius:var(--radius-sm);background:#FAFAFA;overflow:hidden;transition:border-color .12s}
  .stu-row:hover{background:#fff;border-color:#D1D5DB}
  .stu-row.sec-a{border-left:3px solid var(--blue);background:var(--blue-light)}
  .stu-row.sec-b{border-left:3px solid var(--amber);background:var(--amber-light)}
  .stu-row.sec-none{border-left:3px solid #E5E7EB}
  .stu-main{display:flex;align-items:center;gap:10px;padding:8px 10px}
  .stu-num{font-size:11px;color:#D1D5DB;width:20px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}
  .stu-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
  .av-f{background:#FCE7F3;color:#9D174D}
  .av-m{background:#DBEAFE;color:#1E40AF}
  .stu-info{flex:1;min-width:0}
  .stu-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stu-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
  .stu-teacher{font-size:11px;color:var(--text-muted);white-space:nowrap}
  .svc-tags{display:flex;gap:3px}
  .svc-tag{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;user-select:none;line-height:1.6}
  .svc-tag.off{background:var(--gray-light);color:#D1D5DB;border-color:var(--gray-border)}
  .svc-tag.off:hover{color:#9CA3AF;border-color:#9CA3AF}
  .notes-btn{padding:1px 7px;border-radius:4px;border:1px solid var(--gray-border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;line-height:1.8}
  .notes-btn:hover{background:var(--gray-light)}
  .notes-btn.has-note{background:#FEF9C3;color:#A16207;border-color:#FDE68A}
  .sec-btns{display:flex;gap:4px;flex-shrink:0}
  .sbtn{width:34px;height:28px;border-radius:5px;border:1px solid var(--gray-border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .12s}
  .sbtn:hover{border-color:#9CA3AF}
  .sbtn.sel-a{background:var(--blue);color:#fff;border-color:var(--blue)}
  .sbtn.sel-b{background:var(--amber);color:#fff;border-color:var(--amber)}
  .notes-wrap{padding:0 10px 8px 62px;display:none}
  .notes-wrap.open{display:block}
  .notes-wrap textarea{width:100%;padding:6px 8px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);resize:none;outline:none;min-height:52px;line-height:1.5;background:#fff}
  .notes-wrap textarea:focus{border-color:var(--blue)}
  .notes-wrap textarea::placeholder{color:#D1D5DB}
  .export-bar{display:flex;gap:8px;justify-content:flex-end;margin-top:.75rem;flex-wrap:wrap}
  .ebtn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray-border);background:#fff;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .12s}
  .ebtn:hover{background:var(--gray-light)}
  .ebtn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .ebtn.primary:hover{background:#1D4ED8}
  .ebtn.danger{background:var(--red);color:#fff;border-color:var(--red)}
  .master-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:1rem}
  .mc{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius);padding:.875rem 1rem;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
  .mc:hover{border-color:#93C5FD;box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .mc-grade{font-size:13px;font-weight:600;margin-bottom:2px}
  .mc-teacher{font-size:11px;color:var(--text-muted);margin-bottom:.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mc-bar{height:4px;border-radius:2px;background:#E5E7EB;display:flex;overflow:hidden;margin-bottom:.4rem}
  .mc-a{background:var(--blue)}
  .mc-b{background:var(--amber)}
  .mc-nums{display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace}
  .mc-status{font-size:11px;font-weight:500;margin-top:4px}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--gray-border);font-weight:500;color:var(--text-muted);font-size:12px;white-space:nowrap}
  td{padding:7px 10px;border-bottom:1px solid #F3F4F6;color:var(--text);vertical-align:middle}
  tr:hover td{background:#FAFAFA}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
  .badge-a{background:var(--blue-light);color:var(--blue)}
  .badge-b{background:var(--amber-light);color:var(--amber)}
  .badge-none{background:var(--gray-light);color:var(--text-muted)}
  .grade-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
  .toast{position:fixed;bottom:24px;right:24px;background:#111827;color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:9999;box-shadow:var(--shadow-md)}
  .toast.show{opacity:1;transform:translateY(0)}
  .confetti-stage{position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden}
  .empty{text-align:center;padding:2rem;color:var(--text-muted);font-size:13px}
  .admin-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:.75rem;flex-wrap:wrap}
  .admin-toolbar input{flex:1;min-width:200px;padding:7px 11px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
  .admin-toolbar input:focus{border-color:var(--blue)}
  .overall-banner{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius);padding:.875rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:var(--shadow)}
  .ob-stat{text-align:center}
  .ob-num{font-size:22px;font-weight:600;line-height:1}
  .ob-lbl{font-size:11px;color:var(--text-muted);margin-top:2px}
  .ob-divider{width:1px;height:36px;background:var(--gray-border)}
  .ob-prog{flex:1;min-width:160px}
  .ob-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;display:flex;margin-top:4px}
  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9000;display:flex;align-items:center;justify-content:center}
  .modal{background:#fff;border-radius:var(--radius);padding:1.5rem;max-width:360px;width:90%;box-shadow:var(--shadow-md)}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:.5rem}
  .modal p{font-size:13px;color:var(--text-muted);margin-bottom:1.25rem;line-height:1.6}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end}
  /* PRINT */
  @media print {
    body{background:#fff;font-size:11px}
    .topbar,.grade-pills,.toolbar,.export-bar,.confetti-stage,.toast,.modal-overlay,.vtab{display:none!important}
    .main{padding:0;max-width:100%}
    .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:.5rem}
    .stu-row{page-break-inside:avoid;margin-bottom:2px}
    .notes-wrap{display:block!important}
    .svc-tag.off{display:none}
    .print-header{display:block!important}
    #admin-view{display:none!important}
    .sbtn,.notes-btn,.auto-btn,.reset-btn,.print-btn,.fbtn{display:none!important}
  }
  .print-header{display:none;font-size:13px;font-weight:600;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid #111}
</style>
</head>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="confetti-stage" id="confetti-stage"></div>

function dedup(a){const s=new Set();return a.filter(r=>{const k=r[0]+'|'+r[1]+'|'+r[2]+'|'+r[3];if(s.has(k))return false;s.add(k);return true;});}
const students=dedup(RAW).map((r,i)=>({id:i,first:r[0],last:r[1],grade:r[2],teacher:r[3],gender:r[4],section:'',services:[],notes:'',notesOpen:false}));

let currentGrade='K',curFilter='all',curSearch='',masterFilter='all';

function byGrade(g){return students.filter(s=>s.grade===g).sort((a,b)=>a.last.localeCompare(b.last)||a.first.localeCompare(b.first));}
function stats(g){const l=byGrade(g);const a=l.filter(s=>s.section==='A').length,b=l.filter(s=>s.section==='B').length;return{total:l.length,a,b,unset:l.length-a-b,done:l.length>0&&l.length===a+b};}

function setView(v){
  document.getElementById('teacher-view').style.display=v==='teacher'?'':'none';
  document.getElementById('admin-view').style.display=v==='admin'?'':'none';
  document.getElementById('vt-teacher').classList.toggle('active',v==='teacher');
  document.getElementById('vt-admin').classList.toggle('active',v==='admin');
  if(v==='admin'){renderOverall();renderMasterGrid();renderMasterTable();}
}

function buildPills(){
  const c=document.getElementById('grade-pills');c.innerHTML='';
  GRADES.forEach(g=>{
    const b=document.createElement('button');
    b.className='gpill'+(g===currentGrade?' active':'');
    b.textContent=LABELS[g];
    if(g===currentGrade){b.style.background=NAV_COLORS[g];b.style.color='#fff';}
    b.onclick=()=>{currentGrade=g;curFilter='all';curSearch='';buildPills();renderGrade();};
    c.appendChild(b);
  });
}

function svcHTML(s){
  return SVCS.map(sv=>{
    const on=s.services.includes(sv);
    const c=SVC_STYLE[sv].split('|');
    const style=on?`background:${c[0]};color:${c[1]};border-color:${c[0]}`:'' ;
    return `<span class="svc-tag ${on?'on':'off'}" style="${style}" onclick="toggleSvc(${s.id},'${sv}')">${sv}</span>`;
  }).join('');
}

function renderGrade(){
  const panel=document.getElementById('grade-panel');
  const gs=byGrade(currentGrade);
  const st=stats(currentGrade);
  const teachers=[...new Set(gs.map(s=>s.teacher))].join(' · ');
  const pA=st.total?Math.round(st.a/st.total*100):0;
  const pB=st.total?Math.round(st.b/st.total*100):0;
  let fl=gs;
  if(curFilter==='a')fl=gs.filter(s=>s.section==='A');
  else if(curFilter==='b')fl=gs.filter(s=>s.section==='B');
  else if(curFilter==='unset')fl=gs.filter(s=>!s.section);
  if(curSearch)fl=fl.filter(s=>(s.first+' '+s.last).toLowerCase().includes(curSearch.toLowerCase()));

  panel.innerHTML=`<div class="card">
    <div class="print-header">Sonoran Schools 2025–26 &nbsp;·&nbsp; ${LABELS[currentGrade]} &nbsp;·&nbsp; Section Placement &nbsp;·&nbsp; ${teachers}</div>
    <div class="card-header">
      <div><div class="card-title">${LABELS[currentGrade]}</div><div class="card-sub">${teachers}</div></div>
      <div class="stats-row">
        <span class="spill sp-total">${st.total} students</span>
        <span class="spill sp-a">A: ${st.a}</span>
        <span class="spill sp-b">B: ${st.b}</span>
        ${st.unset?`<span class="spill sp-unset">${st.unset} unassigned</span>`:`<span class="spill sp-done">&#10003; Complete</span>`}
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-a" style="width:${pA}%"></div><div class="prog-b" style="width:${pB}%"></div></div>
    <div class="toolbar">
      <input type="text" placeholder="Search student..." id="stu-search" value="${curSearch}" oninput="curSearch=this.value;renderGrade()">
      <button class="fbtn${curFilter==='all'?' active':''}" onclick="curFilter='all';renderGrade()">All</button>
      <button class="fbtn${curFilter==='a'?' active':''}" onclick="curFilter='a';renderGrade()">Sec A</button>
      <button class="fbtn${curFilter==='b'?' active':''}" onclick="curFilter='b';renderGrade()">Sec B</button>
      <button class="fbtn${curFilter==='unset'?' active':''}" onclick="curFilter='unset';renderGrade()">Unset</button>
      <button class="auto-btn" onclick="autoBalance()">&#9889; Auto-balance</button>
      <button class="reset-btn" onclick="confirmReset()">&#8635; Reset grade</button>
      <button class="print-btn" onclick="window.print()">&#128438; Print</button>
    </div>
    <div class="stu-list">${fl.length?fl.map(s=>`
      <div class="stu-row sec-${s.section?s.section.toLowerCase():'none'}" id="sr-${s.id}">
        <div class="stu-main">
          <div class="stu-num">${gs.indexOf(s)+1}</div>
          <div class="stu-avatar av-${s.gender.toLowerCase()}">${s.first[0]}${s.last[0]}</div>
          <div class="stu-info">
            <div class="stu-name">${s.last}, ${s.first}</div>
            <div class="stu-meta">
              <span class="stu-teacher">${s.teacher}</span>
              <div class="svc-tags">${svcHTML(s)}</div>
              <button class="notes-btn${s.notes?' has-note':''}" onclick="toggleNotes(${s.id})" id="nb-${s.id}">${s.notes?'&#9998; Note':'+ Note'}</button>
            </div>
          </div>
          <div class="sec-btns">
            <button class="sbtn${s.section==='A'?' sel-a':''}" onclick="assign(${s.id},'A')">A</button>
            <button class="sbtn${s.section==='B'?' sel-b':''}" onclick="assign(${s.id},'B')">B</button>
          </div>
        </div>
        <div class="notes-wrap${s.notesOpen?' open':''}" id="nw-${s.id}">
          <textarea placeholder="Add notes about this student's placement (e.g. keep with sibling, needs supportive teacher)..." oninput="saveNote(${s.id},this.value)">${s.notes}</textarea>
        </div>
      </div>`).join(''):`<div class="empty">No students match this filter</div>`}
    </div>
    <div class="export-bar">
      <button class="ebtn" onclick="exportGrade()">Export ${LABELS[currentGrade]} CSV</button>
      ${st.done?`<button class="ebtn primary" onclick="showToast('${LABELS[currentGrade]} marked complete!')">Mark complete &#10003;</button>`:''}
    </div>
  </div>`;
  const si=document.getElementById('stu-search');if(si)si.focus();
}

function assign(id,sec){
  const s=students.find(x=>x.id===id);if(!s)return;
  s.section=s.section===sec?'':sec;
  renderGrade();
  if(stats(currentGrade).done)celebrate();
}

function toggleSvc(id,svc){
  const s=students.find(x=>x.id===id);if(!s)return;
  const i=s.services.indexOf(svc);
  if(i>=0)s.services.splice(i,1);else s.services.push(svc);
  renderGrade();
}

function toggleNotes(id){
  const s=students.find(x=>x.id===id);if(!s)return;
  s.notesOpen=!s.notesOpen;
  const nw=document.getElementById('nw-'+id);
  if(nw){nw.classList.toggle('open',s.notesOpen);if(s.notesOpen)nw.querySelector('textarea').focus();}
}

function saveNote(id,val){
  const s=students.find(x=>x.id===id);if(!s)return;
  s.notes=val;
  const nb=document.getElementById('nb-'+id);
  if(nb){nb.className='notes-btn'+(val?' has-note':'');nb.innerHTML=val?'&#9998; Note':'+ Note';}
}

function autoBalance(){
  const unset=byGrade(currentGrade).filter(s=>!s.section);
  unset.forEach((s,i)=>s.section=i%2===0?'A':'B');
  showToast('Auto-balanced '+unset.length+' students!');
  renderGrade();
}

function confirmReset(){
  const o=document.createElement('div');
  o.className='modal-overlay';
  o.innerHTML=`<div class="modal">
    <h3>Reset ${LABELS[currentGrade]}?</h3>
    <p>This will clear all section assignments, service tags, and notes for <strong>${LABELS[currentGrade]}</strong>. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="ebtn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="ebtn danger" onclick="resetGrade();this.closest('.modal-overlay').remove()">Yes, reset</button>
    </div>
  </div>`;
  document.body.appendChild(o);
}

function resetGrade(){
  byGrade(currentGrade).forEach(s=>{s.section='';s.services=[];s.notes='';s.notesOpen=false;});
  showToast(LABELS[currentGrade]+' has been reset');
  renderGrade();
}

function renderOverall(){
  const total=students.length;
  const a=students.filter(s=>s.section==='A').length;
  const b=students.filter(s=>s.section==='B').length;
  const unset=total-a-b;
  const pA=Math.round(a/total*100);
  const pB=Math.round(b/total*100);
  document.getElementById('overall-banner').innerHTML=`
    <div class="ob-stat"><div class="ob-num">${total}</div><div class="ob-lbl">Total students</div></div>
    <div class="ob-divider"></div>
    <div class="ob-stat"><div class="ob-num" style="color:var(--blue)">${a}</div><div class="ob-lbl">Section A</div></div>
    <div class="ob-stat"><div class="ob-num" style="color:var(--amber)">${b}</div><div class="ob-lbl">Section B</div></div>
    <div class="ob-stat"><div class="ob-num" style="color:var(--red)">${unset}</div><div class="ob-lbl">Unassigned</div></div>
    <div class="ob-divider"></div>
    <div class="ob-prog">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Overall placement progress</div>
      <div class="ob-bar"><div class="prog-a" style="width:${pA}%"></div><div class="prog-b" style="width:${pB}%"></div></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${pA+pB}% complete</div>
    </div>`;
}

function renderMasterGrid(){
  document.getElementById('master-grid').innerHTML=GRADES.map(g=>{
    const st=stats(g);
    const pA=st.total?Math.round(st.a/st.total*100):0;
    const pB=st.total?Math.round(st.b/st.total*100):0;
    const ts=[...new Set(byGrade(g).map(s=>s.teacher))].map(t=>t.split(',')[0]).join(' & ');
    return `<div class="mc" onclick="setView('teacher');currentGrade='${g}';curFilter='all';curSearch='';buildPills();renderGrade()">
      <div class="mc-grade" style="color:${NAV_COLORS[g]}">${LABELS[g]}</div>
      <div class="mc-teacher">${ts}</div>
      <div class="mc-bar"><div class="mc-a" style="width:${pA}%"></div><div class="mc-b" style="width:${pB}%"></div></div>
      <div class="mc-nums"><span style="color:var(--blue)">A: ${st.a}</span><span style="color:var(--amber)">B: ${st.b}</span><span style="color:var(--gray)">${st.total}</span></div>
      <div class="mc-status" style="color:${st.done?'var(--green)':'var(--red)'}">${st.done?'&#10003; Complete':st.unset+' unassigned'}</div>
    </div>`;
  }).join('');
}

function updateMF(){
  ['all','a','b','u'].forEach(f=>{
    const el=document.getElementById('mf-'+f);if(!el)return;
    const on=masterFilter===f;
    el.style.background=on?'var(--blue-light)':'';el.style.color=on?'var(--blue)':'';el.style.borderColor=on?'var(--blue-mid)':'var(--gray-border)';
  });
}

function renderMasterTable(){
  const q=(document.getElementById('master-search')||{}).value||'';
  let rows=students.slice();
  if(q)rows=rows.filter(s=>(s.first+' '+s.last+' '+LABELS[s.grade]).toLowerCase().includes(q.toLowerCase()));
  if(masterFilter==='a')rows=rows.filter(s=>s.section==='A');
  else if(masterFilter==='b')rows=rows.filter(s=>s.section==='B');
  else if(masterFilter==='u')rows=rows.filter(s=>!s.section);
  rows.sort((a,b)=>(GRADES.indexOf(a.grade)-GRADES.indexOf(b.grade))||a.last.localeCompare(b.last));
  document.getElementById('master-tbody').innerHTML=rows.map(s=>{
    const svcs=s.services.map(sv=>{const c=SVC_STYLE[sv].split('|');return`<span style="background:${c[0]};color:${c[1]};padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;margin-right:2px">${sv}</span>`;}).join('');
    return `<tr>
      <td><span class="grade-tag" style="background:${GRADE_BG[s.grade]};color:${NAV_COLORS[s.grade]}">${LABELS[s.grade]}</span></td>
      <td>${s.last}</td><td>${s.first}</td><td>${s.gender}</td>
      <td style="font-size:12px;color:var(--gray)">${s.teacher}</td>
      <td>${svcs||'<span style="color:#D1D5DB;font-size:11px">—</span>'}</td>
      <td><span class="badge ${s.section?'badge-'+s.section.toLowerCase():'badge-none'}">${s.section||'—'}</span></td>
      <td style="font-size:11px;color:var(--gray);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.notes||''}</td>
    </tr>`;
  }).join('');
}

function exportGrade(){
  const gs=byGrade(currentGrade);
  const csv='Last Name,First Name,Grade,Teacher,Gender,Section,Services,Notes\n'+gs.map(s=>`"${s.last}","${s.first}","${LABELS[s.grade]}","${s.teacher}","${s.gender}","${s.section}","${s.services.join(';')}","${s.notes.replace(/"/g,"'")}"`).join('\n');
  dl(csv,LABELS[currentGrade].replace(' ','_')+'_Sections.csv');
  showToast(LABELS[currentGrade]+' exported!');
}
function exportAll(){
  const csv='Last Name,First Name,Grade,Teacher,Gender,Section,Services,Notes\n'+students.map(s=>`"${s.last}","${s.first}","${LABELS[s.grade]}","${s.teacher}","${s.gender}","${s.section}","${s.services.join(';')}","${s.notes.replace(/"/g,"'")}"`).join('\n');
  dl(csv,'Sonoran_All_Sections_2025-26.csv');
  showToast('Full roster exported!');
}
function dl(content,filename){const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(content);a.download=filename;a.click();}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function celebrate(){
  const stage=document.getElementById('confetti-stage');stage.innerHTML='';
  const colors=['#2563EB','#D97706','#16A34A','#DC2626','#7C3AED','#DB2777'];
  for(let i=0;i<50;i++){
    const d=document.createElement('div');const sz=6+Math.random()*10;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-16px`;
    stage.appendChild(d);
    d.animate([{transform:'translateY(0) rotate(0deg)',opacity:1},{transform:`translateY(${window.innerHeight*.8+Math.random()*200}px) rotate(720deg)`,opacity:0}],{duration:1200+Math.random()*1200,easing:'ease-in',fill:'forwards',delay:Math.random()*400});
  }
  showToast(LABELS[currentGrade]+' — all students placed!');
  setTimeout(()=>stage.innerHTML='',2800);
}

buildPills();
renderGrade();
</script>
</body>
</html>
